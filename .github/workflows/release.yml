name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create app bundle
        run: |
          mkdir -p "GD Info.app/Contents/MacOS"
          mkdir -p "GD Info.app/Contents/Resources"
          cp target/release/gd_info "GD Info.app/Contents/MacOS/GD Info"
          cat > "GD Info.app/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>GD Info</string>
            <key>CFBundleIdentifier</key>
            <string>com.cookieshualon.gdinfo</string>
            <key>CFBundleName</key>
            <string>GD Info</string>
            <key>CFBundleDisplayName</key>
            <string>GD Info</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: hdiutil create -volname "GD Info" -srcfolder "GD Info.app" -ov -format UDZO "GD-Info.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GD-Info.dmg
          path: GD-Info.dmg

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename executable
        shell: pwsh
        run: Copy-Item target\release\gd_info.exe gd-info.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gd-info.exe
          path: gd-info.exe

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev patchelf wget

      - name: Build
        run: cargo build --release

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          cp target/release/gd_info AppDir/usr/bin/gd-info
          cat > AppDir/gd-info.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=GD Info
          Exec=gd-info
          Icon=gd-info
          Categories=Utility;
          DESKTOP
          cp AppDir/gd-info.desktop AppDir/usr/share/applications/gd-info.desktop
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          python3 - <<'PY'
          import struct, zlib
          width = height = 256
          color = bytes([64, 180, 64, 255])
          raw = b''.join(b'\x00' + color * width for _ in range(height))
          def chunk(kind, data):
              return struct.pack('>I', len(data)) + kind + data + struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff)
          png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          open('AppDir/gd-info.png', 'wb').write(png)
          open('AppDir/usr/share/icons/hicolor/256x256/apps/gd-info.png', 'wb').write(png)
          PY
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/gd-info" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --desktop-file AppDir/gd-info.desktop --icon-file AppDir/gd-info.png --output appimage
          mv GD_Info-x86_64.AppImage GD-Info.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GD-Info.AppImage
          path: GD-Info.AppImage

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [macos, windows, linux]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GD-Info.dmg
            artifacts/gd-info.exe
            artifacts/GD-Info.AppImage
